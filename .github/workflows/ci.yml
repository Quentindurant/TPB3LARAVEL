name: 🚀 Deploy Laravel (CineMap)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    name: 🎨 Pint
    runs-on: ubuntu-latest

    steps:
      - name: "📦 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️  Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: "📦 Install deps"
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: "🎨 Pint"
        run: ./vendor/bin/pint --test

  deploy:
    name: 🐳 Build & Deploy
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: "📦 Checkout"
        uses: actions/checkout@v4

      - name: "🚀 Deploy on VPS via SSH"
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e

            APP_NAME="cinemap"
            APP_DIR="/var/www/html/${{ secrets.VPS_DOMAIN }}"
            PORT=8090

            echo "──────────────────────────────────────────"
            echo "  📥  Pull des dernières modifications"
            echo "──────────────────────────────────────────"
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd --exclude=database-prod

            echo "──────────────────────────────────────────"
            echo "  🐳  Rebuild de l'image Docker"
            echo "──────────────────────────────────────────"
            sudo docker build -t "${APP_NAME}:latest" .

            echo "──────────────────────────────────────────"
            echo "  ♻️   Redémarrage du conteneur"
            echo "──────────────────────────────────────────"
            sudo docker stop "$APP_NAME" || true
            sudo docker rm   "$APP_NAME" || true
            sudo docker ps -a --format "{{.ID}} {{.Ports}}" \
              | grep "${PORT}" \
              | awk '{print $1}' \
              | xargs -r sudo docker rm -f || true
            sleep 2
            sudo docker run -d \
              --restart unless-stopped \
              --name "$APP_NAME" \
              -p ${PORT}:80 \
              --env-file "$APP_DIR/.env" \
              "${APP_NAME}:latest"

            echo "──────────────────────────────────────────"
            echo "  🗄️   Migrations"
            echo "──────────────────────────────────────────"
            sleep 3
            sudo docker exec "$APP_NAME" php artisan migrate --force
            sudo docker exec "$APP_NAME" php artisan db:seed --force || true

            echo "──────────────────────────────────────────"
            echo "  🔁  Health check"
            echo "──────────────────────────────────────────"
            sleep 5
            HTTP=$(curl -sk -o /dev/null -w "%{http_code}" "http://127.0.0.1:${PORT}" || echo "000")
            if [[ "$HTTP" =~ ^(200|301|302|304)$ ]]; then
              echo "  ✅  Health check OK — HTTP $HTTP"
            else
              echo "  ⚠️   Health check a échoué (Code: $HTTP)"
              sudo docker logs "$APP_NAME"
              exit 1
            fi

            echo "  ✅  Déploiement CineMap terminé !"
